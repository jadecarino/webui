<div *ngIf="!filtersExpanded" class="main">

    <ibm-sidenav class="bx--side-nav persistent-sidebar" id="side-navigation-bar" [expanded]="true">
        <ibm-sidenav-item>
            <img src="../../../../../assets/icons/table.svg" class="icon">
        </ibm-sidenav-item>
        <ibm-sidenav-item (click)="expandFilters()">
            <img src="../../../../../assets/icons/filter.svg" class="icon">
        </ibm-sidenav-item>
        <ibm-sidenav-item>
            <img src="../../../../../assets/icons/compare-list.svg" class="icon">
        </ibm-sidenav-item>
        <ibm-sidenav-item>
            <img src="../../../../../assets/icons/worklist.svg" class="icon">
        </ibm-sidenav-item>
        <ibm-sidenav-item>
            <img src="../../../../../assets/icons/help.svg" class="icon">
        </ibm-sidenav-item>
    </ibm-sidenav>

    <div class="bx--grid results-page">
        <app-results-table class="results-table"></app-results-table>
    </div>
</div>

<div *ngIf="filtersExpanded" class="main show-sidebar">

    <ibm-sidenav class="bx--side-nav persistent-sidebar" id="side-navigation-bar">
            <ibm-sidenav-item>
                <img src="../../../../../assets/icons/table.svg" class="icon">
            </ibm-sidenav-item>
            <ibm-sidenav-item (click)="expandFilters()">
                <img src="../../../../../assets/icons/filter.svg" class="icon">
            </ibm-sidenav-item>
            <ibm-sidenav-item>
                <img src="../../../../../assets/icons/compare-list.svg" class="icon">
            </ibm-sidenav-item>
            <ibm-sidenav-item>
                <img src="../../../../../assets/icons/worklist.svg" class="icon">
            </ibm-sidenav-item>
            <ibm-sidenav-item>
                <img src="../../../../../assets/icons/help.svg" class="icon">
            </ibm-sidenav-item>
    </ibm-sidenav>

    <div class="filter-sidebar">
        <h4>Filter tests</h4>
        <p>Test class name</p>
        <app-testclasses-filter id="filter"></app-testclasses-filter>
        <p>Bundle</p>
        <app-bundle-filter id="filter"></app-bundle-filter>
        <p>Requestor</p>
        <app-requestors-filter id="filter"></app-requestors-filter>
        <p>Result status</p>
        <app-resultnames-filter id="filter"></app-resultnames-filter>
    </div>
    <div class="bx--grid results-page">
        <app-results-table class="results-table"></app-results-table>
    </div>
</div>
